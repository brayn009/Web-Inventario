<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colmado La Esquina — Ventas</title>
<link rel="stylesheet" href="Style-prollect.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
 
<div class="app">
  <header class="topbar">
    <div class="brand"><span class="brand-mark">$</span> Colmado La Esquina</div>
    <nav class="tabs">
      <button class="tab active" data-view="catalogo">Catálogo</button>
      <button class="tab" data-view="admin">Administración</button>
    </nav>
  </header>

  <main id="view-catalogo" class="view active">
    <section class="panel-browse">
      <div class="search-row">
        <input id="search" type="text" placeholder="Buscar producto…" autocomplete="off">
      </div>
      <div id="grid" class="grid"></div>
    </section>

    <aside class="panel-receipt">
      <div class="receipt">
        <div class="receipt-top">
          <div class="receipt-title">Colmado La Esquina</div>
          <div class="receipt-sub">Nota de venta</div>
        </div>
        <div class="receipt-lines" id="receipt-lines"></div>
        <div class="receipt-totals">
          <div class="row"><span>Subtotal</span><span class="mono" id="subtotal">RD$0.00</span></div>
          <div class="row"><span>ITBIS (18%)</span><span class="mono" id="itbis">RD$0.00</span></div>
          <div class="row total"><span>Total</span><span class="mono" id="total">RD$0.00</span></div>
        </div>
        <button id="clear-cart" class="btn-ghost">Vaciar selección</button>
      </div>
      <div class="ticket-edge"></div>
    </aside>
  </main>

  <main id="view-admin" class="view">
    <section class="panel-admin">
      <h2>Administrar productos</h2>
      <form id="form-nuevo" class="form-row">
        <input id="nuevo-nombre" placeholder="Nombre del producto" required>
        <input id="nuevo-precio" type="number" step="0.01" min="0" placeholder="Precio (RD$)" required>
        <input id="nuevo-stock" type="number" min="0" placeholder="Existencia" required>
        <button type="submit">Añadir producto</button>
      </form>
      <table>
        <thead><tr><th>Nombre</th><th>Precio</th><th>Existencia</th><th></th></tr></thead>
        <tbody id="tabla-body"></tbody>
      </table>
      <button id="reset-data" class="btn-ghost">Restaurar catálogo por defecto</button>
    </section>
  </main>
</div>
 <script src="DB-inventario.js"></script>
 <script src="JS-inventario.js"></script>
</body>
</html>
